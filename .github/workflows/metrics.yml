name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ① 전체 통계 (overview)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jhcode33
          filename: github-metrics-overview.svg

          base: activity, community, repositories
          plugin_languages: no

          config_display: large
          config_padding: 10

          # 하늘색 테마 CSS 주입
          extras_css: |
            :root {
              --color-background: #EFF6FF;
              --color-border: #93C5FD;
              --color-text: #1e3a5f;
              --color-header: #1e3a5f;
              --color-link: #2d72d9;
              --color-accent: #3B82F6;
            }
            svg {
              background: #EFF6FF !important;
              border: 1px solid #93C5FD !important;
              border-radius: 8px !important;
            }
            text, tspan {
              fill: #1e3a5f !important;
            }
            .header {
              fill: #1e3a5f !important;
            }
            .progress-bar-bg {
              fill: #DBEAFE !important;
            }
            .progress-bar {
              fill: #3B82F6 !important;
            }

          output_action: commit
          committer_branch: main

      # ② 언어 통계 (languages)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jhcode33
          filename: github-metrics-languages.svg

          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage, bytes-size
          plugin_languages_sections: most-used

          config_display: large
          config_padding: 10

          extras_css: |
            :root {
              --color-background: #EFF6FF;
              --color-border: #93C5FD;
              --color-text: #1e3a5f;
            }
            svg {
              background: #EFF6FF !important;
              border: 1px solid #93C5FD !important;
              border-radius: 8px !important;
            }
            text, tspan {
              fill: #1e3a5f !important;
            }
            .progress-bar-bg {
              fill: #DBEAFE !important;
            }

          output_action: commit
          committer_branch: main
