name: Metrics

on:
  # 매일 자정(UTC) 자동 실행 — 매일 최신 통계로 업데이트
  schedule:
    - cron: "0 0 * * *"
  # 수동으로도 실행 가능 (Actions 탭에서 버튼 클릭)
  workflow_dispatch:
  # main 브랜치에 push할 때도 실행
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # SVG 파일을 레포에 커밋하기 위한 쓰기 권한

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jhcode33

          # 통계 구성
          base: header, activity, community, repositories

          # 언어 통계 플러그인 활성화
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage

          # 생성된 SVG를 레포에 바로 커밋
          output_action: commit
          committer_branch: main
          filename: github-metrics.svg
